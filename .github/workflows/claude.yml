name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          classify_inline_comments: "true"
          additional_permissions: |
            actions: read
          prompt: |
            When performing code review, follow the review guidelines from .gemini/styleguide.md in the repository root.
            These guidelines define review priorities, anti-noise rules, and repository-specific cues.

            When you find issues in the code, post them as INLINE COMMENTS on the specific lines
            of the PR diff using the GitHub API, not as a single large comment.
            Use `gh api` with the pulls/comments or pulls/reviews endpoint to create
            review comments on specific files and lines of the diff.

            For each issue, include:
            - Severity: [critical], [warning], or [suggestion]
            - Clear description of the issue
            - Suggested fix if applicable

            Post a brief summary as a separate top-level PR comment.

            Do NOT comment on formatting enforced by rustfmt/forge fmt.
            Do NOT flood with low-signal style comments.
